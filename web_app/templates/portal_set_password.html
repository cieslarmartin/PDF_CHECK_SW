<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nastavení hesla – DokuCheck</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo/dokucheck-icon.svg') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center px-6">
    <div class="max-w-sm w-full">
        <h1 class="text-2xl font-bold text-white mb-2 text-center">Nastavení hesla</h1>
        <p class="text-slate-400 text-sm text-center mb-6">Zvolte si heslo pro přihlášení do uživatelského portálu a do aplikace DokuCheck.</p>
        {% if error %}<p class="text-red-400 text-sm mb-4">{{ error }}</p>{% endif %}
        <form method="post" action="" class="space-y-4">
            <input type="hidden" name="token" value="{{ token }}">
            <div>
                <label class="block text-slate-300 text-sm mb-1">Nové heslo</label>
                <input type="password" name="new_password" required minlength="6" class="w-full px-4 py-2 rounded-lg bg-slate-800 border border-slate-600 text-white" placeholder="min. 6 znaků">
            </div>
            <div>
                <label class="block text-slate-300 text-sm mb-1">Heslo znovu</label>
                <input type="password" name="new_password2" required minlength="6" class="w-full px-4 py-2 rounded-lg bg-slate-800 border border-slate-600 text-white" placeholder="stejné heslo">
            </div>
            <button type="submit" class="w-full py-3 rounded-lg font-semibold bg-blue-600 text-white hover:bg-blue-500 transition">Nastavit heslo</button>
        </form>
        <p class="mt-6 text-center text-slate-500 text-sm"><a href="{{ url_for('portal') }}" class="text-blue-400 hover:underline">Zpět na přihlášení</a></p>
    </div>
</body>
</html>
